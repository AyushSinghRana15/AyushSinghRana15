name: Generate Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: AyushSinghRana15
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to output branch
        run: |
          mkdir -p dist
          mv -f github-contribution-grid-snake.svg dist/ 2>/dev/null || true
          mv -f github-contribution-grid-snake-dark.svg dist/ 2>/dev/null || true
          ls -la dist/
          cd dist
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Update snake grid"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git branch -M output
          git push --force origin output
